{{ define "main" }}
<div style="max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem;">

  <div>
    {{- range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="post-link">
      <div class="post-date">
        {{ .Date.Format "01-02" }}
      </div>
      <div>
        <h2 class="post-title">{{ .Title }}</h2>
        <p class="post-description">{{ .Params.description | default .Summary }}</p>
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
