{{ define "main" }}
<div style="max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem;">

  <div>
    {{- $blogSection := site.GetPage "blog" -}}
    {{- if $blogSection -}}
      {{- range $blogSection.Pages.ByDate.Reverse }}
      <a href="{{ .RelPermalink }}" style="display: flex; align-items: baseline; gap: 1.5rem; padding: 1.25rem 1rem; margin: 0 -1rem; border-radius: 0.75rem; text-decoration: none; color: inherit; transition: background-color 0.2s;"
         onmouseover="this.style.backgroundColor='#f9fafb'" onmouseout="this.style.backgroundColor='transparent'">
        <div style="width: 3.5rem; flex-shrink: 0; font-size: 0.875rem; color: #9ca3af; font-family: 'SF Mono', 'Fira Code', monospace;">
          {{ .Date.Format "01-02" }}
        </div>
        <div>
          <h2 style="font-size: 1.05rem; font-weight: 500; color: #1f2937; margin: 0 0 0.25rem 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.4;">{{ .Title }}</h2>
          <p style="font-size: 0.95rem; color: #6b7280; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.5;">{{ .Params.description | default .Summary }}</p>
        </div>
      </a>
      {{ end -}}
    {{- end -}}
  </div>
</div>
{{ end }}
