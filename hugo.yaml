baseURL: "https://jijinexp.github.io/personal-blog/"
locale: "en-us"
title: "Jijin's Blog"

module:
  imports:
    - path: github.com/imfing/hextra

params:
  navbar:
    displayTitle: true
    displayLogo: false
  search:
    enable: true

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: Theme
      weight: 3
      params:
        type: theme-toggle
